<mat-sidenav-container class="shell">

  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <div class="sidenav__logo">
      <mat-icon>insights</mat-icon>
      <span>AnalyticsPro</span>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Overview</span>
      </a>
      <a mat-list-item routerLink="/sales" routerLinkActive="active">
        <mat-icon matListItemIcon>trending_up</mat-icon>
        <span matListItemTitle>Sales Trends</span>
      </a>
      <a mat-list-item routerLink="/products" routerLinkActive="active">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Products</span>
      </a>
      <a mat-list-item routerLink="/customers" routerLinkActive="active">
        <mat-icon matListItemIcon>group</mat-icon>
        <span matListItemTitle>Customers</span>
      </a>
    </mat-nav-list>

    <div class="sidenav__footer text-muted">v1.0.0</div>
  </mat-sidenav>

  <mat-sidenav-content class="main">
    <mat-toolbar class="topbar">

      

      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="topbar__title">E-Commerce Analytics</span>
      <span class="flex-spacer"></span>
      <mat-select [(ngModel)]="dateRange" (ngModelChange)="onRangeChange()"
            class="topbar__range-picker" matTooltip="Date range">
        <mat-option value="7">Last 7 days</mat-option>
        <mat-option value="30">Last 30 days</mat-option>
        <mat-option value="90">Last 90 days</mat-option>
      </mat-select>
      
      <button mat-icon-button (click)="theme.toggle()" matTooltip="Toggle dark mode">
        <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
      <button mat-icon-button matTooltip="Notifications">
        <mat-icon [matBadge]="3" matBadgeColor="warn">notifications</mat-icon>
      </button>
      <button mat-icon-button matTooltip="Account">
        <mat-icon>account_circle</mat-icon>
      </button>
    </mat-toolbar>

    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
